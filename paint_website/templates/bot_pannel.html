
<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    
    <style>

        /* Style for chat icon */
        .chat-icon {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #fff0;
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 1001;
    /* Add animation properties */
    animation-name: rotateIcon;
    animation-duration: 4s;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

@keyframes rotateIcon {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}

       
        .chat-panel {
            position: fixed;
            bottom: 90px; 
            right: 20px;
            background-color: white;
            width: 300px;
            height: 400px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000; /* Ensure the chat panel is below the chat icon */
        }

        .chat-panel-header {
            background-image: url({% static 'resources/header-cover.png' %});
            background-color: #1b7cde;
            color: white;
            padding: 10px;
            border-radius: 10px 10px 0 0;
        }

        .chat-panel-body {
            padding: 20px;
            background-image: url({% static 'resources/mm-logo.png' %});
            background-position: center;
            background-size:contain;
            overflow-y: auto;
            height: 260px; /* Adjust the height as needed */
        }

        .chat-input-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        .chat-input {
            flex-grow: 1;
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        .send-button {
            padding: 10px;
            background-color: #1b7cde;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .send-button i {
            margin-left: 2px;
        }

        /* Style for incoming messages */
        .incoming-message {
            background-color: #74179d9e;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            max-width: 70%;
            word-wrap: break-word;
            clear: both;
            float: left;
        }

        /* Style for user-sent messages */
        .user-message {
            background-color: #b1b1b1;
            color: black;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            max-width: 70%;
            word-wrap: break-word;
            clear: both;
            float: right;
        }
        .bot-log{
            height: 42px;
            width: 53px;
            left: 10px;
            top: -2px;
            position: absolute;
        }
    </style>
</head>
<body>


    <!-- 
    Dear team mate,
    please leave a comment of every 
    feature/bug which you have developed

    f### uh  
    -->

    <!-- Chat icon -->
    <div class="chat-icon" id="chatIcon" style="background-image: url({% static 'resources/artificial-intelligence.png' %}); background-position: center; background-size: 50px;">
        <!-- <i class="fas fa-comment"></i> -->
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-panel-header" style="color: #333;">
           <center> <img src="{% static 'resources/bot-log.png' %}" class="bot-log" alt=""> Martin AI</center>
        </div>
        <div class="chat-panel-body" id="chatMessages">
            <!-- Chat messages will be added dynamically here -->
        </div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" placeholder="Type your message...">
            <button class="send-button" onclick="sendMessage()"><i id="buttonIcon" class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
// Variable to store the speech recognition object
var recognition = new webkitSpeechRecognition();
recognition.continuous = true;
recognition.interimResults = false;
var isMicOn = false; // Variable to track whether the microphone is on or off

// JavaScript to toggle the visibility of the chat panel
document.getElementById('chatIcon').addEventListener('click', function(event) {
    var chatPanel = document.getElementById('chatPanel');
    chatPanel.style.display = chatPanel.style.display === 'none' ? 'block' : 'none';
    event.stopPropagation(); // Prevent the click event from propagating to the document
});

// Add event listener to the document to close the chat panel when clicking outside
document.addEventListener('click', function(event) {
    var chatPanel = document.getElementById('chatPanel');
    if (!chatPanel.contains(event.target)) {
        chatPanel.style.display = 'none';
    }
});

// Function to start speech recognition when holding down the arrow button
document.querySelector('.send-button').addEventListener('mousedown', function() {
    recognition.start();
    isMicOn = true;
    updateButtonIcon();
});

// Function to stop speech recognition when releasing the arrow button
document.querySelector('.send-button').addEventListener('mouseup', function() {
    recognition.stop();
    isMicOn = false;
    updateButtonIcon();
});

// Function to handle speech recognition results


recognition.onresult = function(event) {
    var inputField = document.querySelector('.chat-input');
    inputField.value += event.results[0][0].transcript + ' ';
};

// Function to send message
function sendMessage() {
    var inputField = document.querySelector('.chat-input');
    var message = inputField.value.trim();

    if (message !== '') {
        var chatMessages = document.getElementById('chatMessages');
        var userMessage = document.createElement('div');
        userMessage.className = 'user-message';
        userMessage.textContent = message;
        chatMessages.appendChild(userMessage);

        // Send message to backend using AJAX
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/process_message/?message=' + encodeURIComponent(message), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === XMLHttpRequest.DONE) {
                if (xhr.status === 200) {
                    var response = JSON.parse(xhr.responseText).response;
                    displayResponse(response);
                } else {
                    console.error('Error:', xhr.status);
                }
            }
        };
        xhr.send();

        inputField.value = '';
    }
}

// Function to dynamically update the button icon based on the microphone status
function updateButtonIcon() {
    var buttonIcon = document.getElementById('buttonIcon');
    if (isMicOn) {
        buttonIcon.className = 'fas fa-microphone';
    } else {
        buttonIcon.className = 'fas fa-arrow-right';
    }
}

function displayResponse(response) {
    var chatMessages = document.getElementById('chatMessages');
    var incomingMessage = document.createElement('div');
    incomingMessage.className = 'incoming-message';
    incomingMessage.textContent = response;
    chatMessages.appendChild(incomingMessage);
}

    </script>
</body>
</html>
